name: DNSHE 域名自动续期

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      force_renew:
        description: '强制续期所有域名'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  renew-domains:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 执行域名续期
        env:
          API_KEYS: ${{ secrets.API_KEYS }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          FORCE_RENEW: ${{ github.event.inputs.force_renew || 'false' }}
        run: |
          python auto_renew.py
      
      - name: 上传续期日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renewal-log-${{ github.run_number }}
          path: renewal_log.txt
          retention-days: 30
